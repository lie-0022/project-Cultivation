<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620">
<title>MainScene 탑다운 배치도</title>
<desc>30x30m 씬에 배치된 밭(FarmArea), 사육장(BarnArea), 마을(VillageArea: 가챠/상점), 플레이어 스폰 위치를 위에서 본 다이어그램. Y축은 위, XZ평면이 지면.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- 씬 경계 (30x30m) -->
<rect x="60" y="40" width="560" height="560" fill="#7CBB72" fill-opacity="0.15" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" rx="4"/>

<!-- 방향 표시 -->
<text x="340" y="32" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">Z+ (북쪽)</text>
<text x="340" y="615" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">Z- (남쪽)</text>
<text x="50" y="324" text-anchor="end" font-family="sans-serif" font-size="12" fill="#444441">X-</text>
<text x="630" y="324" text-anchor="start" font-family="sans-serif" font-size="12" fill="#444441">X+</text>

<!-- VillageArea -->
<rect x="180" y="60" width="320" height="120" fill="#D4B896" fill-opacity="0.5" stroke="#854F0B" stroke-width="0.5" rx="4"/>
<text x="340" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#412402">VillageArea (z=10, 14x6)</text>

<!-- 가챠 -->
<rect x="240" y="100" width="60" height="80" fill="#9B59B6" stroke="#3C3489" stroke-width="0.5" rx="4"/>
<text x="270" y="138" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">G</text>
<text x="270" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFFFFF">가챠</text>
<text x="270" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444441">(-4, 1.5, 10)</text>

<!-- 상점 -->
<rect x="380" y="100" width="60" height="80" fill="#E67E22" stroke="#854F0B" stroke-width="0.5" rx="4"/>
<text x="410" y="138" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">S</text>
<text x="410" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFFFFF">상점</text>
<text x="410" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444441">(4, 1.5, 10)</text>

<!-- FarmArea -->
<rect x="100" y="240" width="180" height="180" fill="#8B6F47" fill-opacity="0.4" stroke="#854F0B" stroke-width="0.5" rx="4"/>
<text x="190" y="258" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#412402">FarmArea (-8, 0, 0)</text>

<rect x="125" y="280" width="60" height="60" fill="#6B4423" stroke="#412402" stroke-width="0.5" rx="2"/>
<text x="155" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">F03</text>
<rect x="195" y="280" width="60" height="60" fill="#6B4423" stroke="#412402" stroke-width="0.5" rx="2"/>
<text x="225" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">F04</text>
<rect x="125" y="350" width="60" height="60" fill="#6B4423" stroke="#412402" stroke-width="0.5" rx="2"/>
<text x="155" y="383" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">F01</text>
<rect x="195" y="350" width="60" height="60" fill="#6B4423" stroke="#412402" stroke-width="0.5" rx="2"/>
<text x="225" y="383" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">F02</text>

<!-- BarnArea -->
<rect x="400" y="240" width="180" height="180" fill="#A0A0A0" fill-opacity="0.4" stroke="#5F5E5A" stroke-width="0.5" rx="4"/>
<text x="490" y="258" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">BarnArea (8, 0, 0)</text>

<rect x="425" y="280" width="60" height="60" fill="#C0C0C0" stroke="#5F5E5A" stroke-width="0.5" rx="2"/>
<text x="455" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444441">B03</text>
<rect x="495" y="280" width="60" height="60" fill="#C0C0C0" stroke="#5F5E5A" stroke-width="0.5" rx="2"/>
<text x="525" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444441">B04</text>
<rect x="425" y="350" width="60" height="60" fill="#C0C0C0" stroke="#5F5E5A" stroke-width="0.5" rx="2"/>
<text x="455" y="383" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444441">B01</text>
<rect x="495" y="350" width="60" height="60" fill="#C0C0C0" stroke="#5F5E5A" stroke-width="0.5" rx="2"/>
<text x="525" y="383" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444441">B02</text>

<!-- Player -->
<circle cx="340" cy="510" r="22" fill="#4A90E2" stroke="#0C447C" stroke-width="0.5"/>
<text x="340" y="515" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">P</text>
<text x="340" y="552" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444441">Player Spawn (0, 1, -8)</text>

<!-- 동선 -->
<line x1="340" y1="488" x2="340" y2="430" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="350" y="465" font-family="sans-serif" font-size="11" fill="#5F5E5A">동선</text>

<!-- 스케일 -->
<text x="620" y="595" text-anchor="end" font-family="sans-serif" font-size="11" fill="#5F5E5A">씬: 30 x 30m</text>
</svg>
